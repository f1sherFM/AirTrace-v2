name: Production Assets

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose -f docker-compose.prod.yml config > /tmp/airtrace-prod-compose.txt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate production asset tests
        run: |
          python -m pytest tests/test_production_compose_assets.py -q
